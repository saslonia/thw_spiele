<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeopardy! – THW Spiele</title>
  <style>
    /* ====== RESET & BASE ====== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #030318;
      --bg-dark:     #060f3a;
      --bg-board:    #0d1f6b;
      --gold:        #d4af37;
      --gold-light:  #f0cc5a;
      --text:        #e8e8ff;
      --cell-empty:  #0a0a2e;
      --cell-hover:  #1a3190;
      --team-1:      #e63946;
      --team-2:      #2a9d8f;
      --team-3:      #f4a261;
      --team-4:      #a8dadc;
      --overlay-bg:  rgba(3,3,24,0.97);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #0d1f6e 0%, #030318 65%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ====== SCREENS ====== */
    .screen { display: none; }
    .screen.active { display: flex; flex-direction: column; min-height: 100vh; }

    /* ====== START SCREEN ====== */
    #screen-start {
      align-items: center;
      padding: 2rem 1rem;
      gap: 1.6rem;
    }

    .start-header { text-align: center; }

    .start-header h1 {
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 24px rgba(212,175,55,0.45);
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    .start-header p { color: #9999cc; margin-top: 0.35rem; }

    .upload-area {
      border: 3px dashed var(--gold);
      border-radius: 12px;
      padding: 1.8rem 3rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      width: 100%;
      max-width: 480px;
    }

    .upload-area:hover, .upload-area.drag-over {
      background: rgba(212,175,55,0.08);
      border-color: var(--gold-light);
    }

    .upload-area .upload-icon { font-size: 2.2rem; margin-bottom: 0.4rem; }
    .upload-area strong { font-size: 1rem; }
    .upload-area p { color: #aaa; font-size: 0.85rem; margin-top: 0.3rem; }
    #file-input { display: none; }

    .cfg-preview {
      background: rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 0.75rem 1.1rem;
      max-width: 480px;
      width: 100%;
      font-size: 0.88rem;
      line-height: 1.5;
    }
    .cfg-preview strong { color: var(--gold); }

    .error-msg {
      background: rgba(244,67,54,0.15);
      border: 1px solid #f44336;
      border-radius: 8px;
      padding: 0.7rem 1.1rem;
      color: #ff8a80;
      max-width: 480px;
      width: 100%;
      font-size: 0.88rem;
    }

    /* ====== TEAM SETUP ====== */
    .teams-section { width: 100%; max-width: 680px; }

    .section-title {
      font-size: 0.9rem;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .team-count-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }

    .btn-count {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      border-radius: 6px;
      width: 32px;
      height: 32px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .btn-count:hover { background: rgba(255,255,255,0.22); }

    #team-count-display { font-weight: 700; color: var(--gold); min-width: 70px; }

    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 0.7rem;
    }

    .team-card {
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      border-left: 4px solid rgba(255,255,255,0.2);
    }
    .team-card[data-team="0"] { border-left-color: var(--team-1); }
    .team-card[data-team="1"] { border-left-color: var(--team-2); }
    .team-card[data-team="2"] { border-left-color: var(--team-3); }
    .team-card[data-team="3"] { border-left-color: var(--team-4); }

    .team-card label {
      display: block;
      font-size: 0.72rem;
      color: #9999cc;
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .team-card input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px;
      color: #fff;
      padding: 0.42rem 0.65rem;
      font-size: 0.92rem;
      margin-bottom: 0.5rem;
    }
    .team-card input[type="text"]:last-child { margin-bottom: 0; }
    .team-card input[type="text"]:focus { outline: none; border-color: var(--gold); }

    /* ====== MODE SELECT ====== */
    .mode-section { max-width: 480px; width: 100%; }

    .mode-buttons { display: flex; gap: 0.7rem; }

    .mode-btn {
      flex: 1;
      padding: 0.65rem 0.8rem;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06);
      color: #fff;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .mode-btn:hover { border-color: var(--gold); }
    .mode-btn.selected {
      border-color: var(--gold);
      background: rgba(212,175,55,0.18);
      color: var(--gold);
      font-weight: 700;
    }
    .mode-btn .mode-name { font-size: 1rem; font-weight: 700; }
    .mode-btn .mode-desc { font-size: 0.72rem; color: #9999cc; margin-top: 0.2rem; }
    .mode-btn.selected .mode-desc { color: rgba(212,175,55,0.65); }

    /* ====== START BUTTON ====== */
    #btn-start {
      background: var(--gold);
      color: #000;
      font-weight: 900;
      font-size: 1.05rem;
      padding: 0.8rem 2.8rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.15s;
      box-shadow: 0 4px 18px rgba(212,175,55,0.35);
    }
    #btn-start:hover { background: var(--gold-light); transform: translateY(-1px); }
    #btn-start:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ====== GAME SCREEN ====== */
    #screen-game { flex-direction: column; }

    /* ====== TOPBAR ====== */
    #topbar {
      display: flex;
      align-items: stretch;
      gap: 0.5rem;
      padding: 0.55rem 0.7rem;
      background: var(--bg-dark);
      border-bottom: 2px solid var(--gold);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    #scores-container {
      display: flex;
      flex: 1;
      gap: 0.5rem;
      flex-wrap: wrap;
      min-width: 0;
    }

    .team-score-box {
      flex: 1;
      min-width: 100px;
      padding: 0.35rem 0.6rem;
      border-radius: 7px;
      text-align: center;
      position: relative;
      overflow: visible;
      border: 2px solid transparent;
    }

    .team-score-box.active-team {
      filter: brightness(1.15);
    }

    .team-name-label {
      font-weight: 700;
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-members-label {
      font-size: 0.6rem;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-score-value {
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--gold);
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
    }

    /* Score animations */
    @keyframes score-up-anim {
      0%   { transform: scale(1.07); background: rgba(76,175,80,0.45); }
      100% { transform: scale(1); }
    }
    @keyframes score-down-anim {
      0%   { background: rgba(244,67,54,0.4); }
      10%  { transform: translateX(-6px); }
      25%  { transform: translateX(6px); }
      40%  { transform: translateX(-4px); }
      55%  { transform: translateX(4px); }
      70%  { transform: translateX(-2px); }
      85%  { transform: translateX(2px); }
      100% { transform: translateX(0); }
    }

    .team-score-box.anim-up   { animation: score-up-anim 0.55s ease-out; }
    .team-score-box.anim-down { animation: score-down-anim 0.5s ease-out; }

    /* Floating delta */
    .score-delta {
      position: absolute;
      top: -4px;
      left: 50%;
      font-size: 1rem;
      font-weight: 900;
      pointer-events: none;
      animation: float-up 1.1s ease-out forwards;
      white-space: nowrap;
      z-index: 10;
    }
    .score-delta.positive { color: #81c784; }
    .score-delta.negative { color: #e57373; }

    @keyframes float-up {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-40px); }
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-shrink: 0;
    }

    .btn-topbar {
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.22);
      color: #fff;
      border-radius: 6px;
      padding: 0.38rem 0.65rem;
      cursor: pointer;
      font-size: 0.78rem;
      transition: background 0.12s;
      white-space: nowrap;
    }
    .btn-topbar:hover { background: rgba(255,255,255,0.18); }

    /* ====== BOARD ====== */
    #board-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0.7rem;
      overflow: auto;
    }

    #board {
      display: grid;
      gap: 5px;
      flex: 1;
    }

    .board-cell {
      background: var(--bg-board);
      border: 2px solid rgba(58,127,239,0.3);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0.3rem;
      min-height: 50px;
      user-select: none;
    }

    .board-cell.header-cell {
      background: var(--bg-dark);
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-color: rgba(58,127,239,0.45);
      min-height: 58px;
      cursor: default;
      line-height: 1.3;
    }

    .board-cell.value-cell {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--gold);
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, transform 0.1s;
    }
    .board-cell.value-cell:hover {
      background: var(--cell-hover);
      border-color: var(--gold);
      transform: scale(1.025);
    }

    .board-cell.revealed {
      background: var(--cell-empty);
      border-color: rgba(255,255,255,0.04);
      cursor: default;
    }

    /* ====== QUESTION OVERLAY ====== */
    #question-overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 2rem 1.5rem;
      gap: 1.2rem;
    }
    #question-overlay.hidden { display: none; }

    #overlay-cat-badge {
      color: var(--gold);
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      opacity: 0.8;
    }

    #overlay-points-badge {
      background: var(--gold);
      color: #000;
      font-size: 1.5rem;
      font-weight: 900;
      padding: 0.15rem 1rem;
      border-radius: 6px;
    }

    #overlay-mode-label {
      font-size: 0.75rem;
      color: #9999cc;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #overlay-display-text {
      font-size: clamp(1.3rem, 3.5vw, 2.2rem);
      font-weight: 700;
      text-align: center;
      max-width: 860px;
      line-height: 1.45;
      animation: fade-in 0.35s ease-out;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #overlay-answer-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }
    #overlay-answer-section.hidden { display: none; }

    #overlay-answer-label {
      font-size: 0.75rem;
      color: #9999cc;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #overlay-answer-text {
      font-size: 1.45rem;
      font-weight: 700;
      color: #90ee90;
      text-align: center;
      max-width: 760px;
      animation: fade-in 0.3s ease-out;
    }

    .overlay-sep {
      width: 100%;
      max-width: 620px;
      border: none;
      border-top: 1px solid rgba(255,255,255,0.12);
    }

    /* Buzzer flow phases */
    .buzzer-phase { display: none; flex-direction: column; align-items: center; gap: 0.7rem; }
    .buzzer-phase.active { display: flex; }

    .buzzer-phase-label {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    /* Phase 1: team buzzer buttons */
    .buzzer-team-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
    }
    .btn-buzzer {
      padding: 0.6rem 1.3rem;
      border-radius: 8px;
      border: 2px solid;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      background: rgba(255,255,255,0.06);
      transition: all 0.15s;
      min-width: 120px;
    }
    .btn-buzzer:hover { background: rgba(255,255,255,0.15); transform: scale(1.04); }
    .btn-buzzer.buzzed-wrong {
      opacity: 0.25;
      pointer-events: none;
      text-decoration: line-through;
    }

    /* Phase 2: correct / wrong for selected team */
    .judge-team-name {
      font-size: 1.15rem;
      font-weight: 700;
      padding: 0.3rem 1rem;
      border-radius: 6px;
      border: 2px solid;
    }
    .judge-btns {
      display: flex;
      gap: 1rem;
    }
    .btn-judge {
      padding: 0.7rem 2rem;
      border-radius: 8px;
      border: 2px solid;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.12s;
      min-width: 140px;
    }
    .btn-judge.correct {
      background: rgba(76,175,80,0.18);
      border-color: #4caf50;
      color: #a5d6a7;
    }
    .btn-judge.correct:hover { background: rgba(76,175,80,0.45); color: #fff; }
    .btn-judge.wrong {
      background: rgba(244,67,54,0.18);
      border-color: #f44336;
      color: #ef9a9a;
    }
    .btn-judge.wrong:hover { background: rgba(244,67,54,0.45); color: #fff; }
    .btn-judge-back {
      background: none;
      border: none;
      color: rgba(255,255,255,0.45);
      font-size: 0.75rem;
      cursor: pointer;
      text-decoration: underline;
      margin-top: -0.2rem;
    }
    .btn-judge-back:hover { color: rgba(255,255,255,0.75); }

    /* Phase 3: result confirmation */
    .result-lines {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      align-items: center;
    }
    .result-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.5rem 1.4rem;
      border-radius: 8px;
      border: 2px solid;
      font-size: 0.95rem;
      font-weight: 700;
      min-width: 280px;
      animation: fade-in 0.25s ease-out;
    }
    .result-line.is-correct {
      background: rgba(76,175,80,0.15);
      border-color: #4caf50;
      color: #a5d6a7;
    }
    .result-line.is-wrong {
      background: rgba(244,67,54,0.15);
      border-color: #f44336;
      color: #ef9a9a;
    }
    .result-line.is-neutral {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.65);
    }
    .result-icon { font-size: 1.2rem; }

    .overlay-actions {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-overlay {
      padding: 0.55rem 1.2rem;
      border-radius: 7px;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.09);
      color: #fff;
      font-size: 0.87rem;
      cursor: pointer;
      transition: all 0.12s;
    }
    .btn-overlay:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.45); }
    .btn-overlay.primary {
      background: var(--gold);
      color: #000;
      border-color: var(--gold);
      font-weight: 700;
    }
    .btn-overlay.primary:hover { background: var(--gold-light); }

    /* ====== END SCREEN ====== */
    #screen-end {
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem;
      gap: 1.4rem;
      text-align: center;
    }

    #end-title {
      font-size: 2.4rem;
      font-weight: 900;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    #end-winner {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .end-rankings {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .end-rank-row {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 0.65rem 1rem;
    }
    .end-rank-row.first { background: rgba(212,175,55,0.18); border: 1px solid var(--gold); }

    .rank-pos { font-size: 1.2rem; font-weight: 900; min-width: 28px; color: var(--gold); }

    .rank-info { flex: 1; text-align: left; }
    .rank-info .rank-name { font-weight: 700; font-size: 0.95rem; }
    .rank-info .rank-members { font-size: 0.72rem; color: #aaa; }

    .rank-score { font-size: 1.1rem; font-weight: 900; color: var(--gold); }

    .end-actions { display: flex; gap: 0.7rem; flex-wrap: wrap; justify-content: center; }

    .btn-end {
      padding: 0.65rem 1.5rem;
      border-radius: 8px;
      border: 2px solid;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.12s;
    }
    .btn-end.primary { background: var(--gold); border-color: var(--gold); color: #000; }
    .btn-end.primary:hover { background: var(--gold-light); }
    .btn-end.secondary { background: transparent; border-color: rgba(255,255,255,0.35); color: #fff; }
    .btn-end.secondary:hover { background: rgba(255,255,255,0.09); }

    /* ====== RESPONSIVE ====== */
    @media (max-width: 680px) {
      .start-header h1 { font-size: 2.2rem; }
      .teams-grid { grid-template-columns: 1fr; }
      .board-cell.value-cell { font-size: 1.05rem; }
      .board-cell.header-cell { font-size: 0.68rem; min-height: 44px; }
      #overlay-display-text { font-size: 1.2rem; }
      .mode-buttons { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- ====== SCREEN: START ====== -->
<div id="screen-start" class="screen active">
  <div class="start-header">
    <h1>Jeopardy!</h1>
    <p id="start-subtitle">THW Spiele</p>
  </div>

  <div id="upload-area" class="upload-area">
    <div class="upload-icon">📂</div>
    <strong>Config-Datei laden</strong>
    <p>YAML-Datei hierher ziehen oder klicken</p>
    <input type="file" id="file-input" accept=".yaml,.yml">
  </div>

  <div id="cfg-preview" class="cfg-preview" style="display:none"></div>
  <div id="error-msg" class="error-msg" style="display:none"></div>

  <div class="teams-section">
    <div class="section-title">Teams</div>
    <div class="team-count-row">
      <button class="btn-count" id="btn-teams-minus">−</button>
      <span id="team-count-display">2 Teams</span>
      <button class="btn-count" id="btn-teams-plus">+</button>
    </div>
    <div class="teams-grid" id="teams-grid"></div>
  </div>

  <div class="mode-section">
    <div class="section-title">Spielmodus</div>
    <div class="mode-buttons">
      <div class="mode-btn selected" data-mode="quiz" onclick="selectMode('quiz')">
        <div class="mode-name">📋 Quiz</div>
        <div class="mode-desc">Frage wird angezeigt, Team gibt Antwort</div>
      </div>
      <div class="mode-btn" data-mode="jeopardy" onclick="selectMode('jeopardy')">
        <div class="mode-name">❓ Jeopardy</div>
        <div class="mode-desc">Antwort wird angezeigt, Team formuliert Frage</div>
      </div>
    </div>
  </div>

  <button id="btn-start" onclick="startGame()" disabled>Spiel starten</button>
</div>


<!-- ====== SCREEN: GAME ====== -->
<div id="screen-game" class="screen">
  <div id="topbar">
    <div id="scores-container"></div>
    <div class="topbar-actions">
      <button class="btn-topbar" id="btn-sound" onclick="toggleSound()" title="Ton ein/aus">🔇</button>
      <button class="btn-topbar" onclick="saveState()">💾 Speichern</button>
      <button class="btn-topbar" onclick="confirmNewGame()">✕ Neu</button>
    </div>
  </div>
  <div id="board-container">
    <div id="board"></div>
  </div>
</div>


<!-- ====== QUESTION OVERLAY ====== -->
<div id="question-overlay" class="hidden">
  <div id="overlay-cat-badge"></div>
  <div id="overlay-points-badge"></div>
  <div id="overlay-mode-label"></div>
  <div id="overlay-display-text"></div>

  <div id="overlay-answer-section" class="hidden">
    <div id="overlay-answer-label">Auflösung</div>
    <div id="overlay-answer-text"></div>
  </div>

  <hr class="overlay-sep">

  <!-- Phase 1: Who buzzed? -->
  <div id="buzzer-phase-1" class="buzzer-phase active">
    <div class="buzzer-phase-label">Wer hat gebuzzert?</div>
    <div id="buzzer-team-btns" class="buzzer-team-btns"></div>
  </div>

  <!-- Phase 2: Correct or wrong? -->
  <div id="buzzer-phase-2" class="buzzer-phase">
    <div class="buzzer-phase-label">Richtig oder falsch?</div>
    <div id="judge-team-name" class="judge-team-name"></div>
    <div class="judge-btns">
      <button class="btn-judge correct" id="btn-judge-correct">✓ Richtig</button>
      <button class="btn-judge wrong" id="btn-judge-wrong">✗ Falsch</button>
    </div>
    <button class="btn-judge-back" id="btn-judge-back">← Anderes Team wählen</button>
  </div>

  <!-- Phase 3: Result confirmation -->
  <div id="buzzer-phase-3" class="buzzer-phase">
    <div id="result-lines" class="result-lines"></div>
    <button class="btn-overlay" id="btn-phase3-continue" onclick="onWrongContinue()">Weiter →</button>
  </div>

  <div class="overlay-actions">
    <button class="btn-overlay" id="btn-reveal" onclick="revealAnswer()">Auflösen</button>
    <button class="btn-overlay" id="btn-nobody" onclick="noOneCorrect()">Niemand richtig</button>
    <button class="btn-overlay primary" id="btn-close" onclick="closeQuestion()">Zurück zum Board</button>
  </div>
</div>


<!-- ====== SCREEN: END ====== -->
<div id="screen-end" class="screen">
  <div id="end-title">Spiel beendet!</div>
  <div id="end-winner"></div>
  <div class="end-rankings" id="end-rankings"></div>
  <div class="end-actions">
    <button class="btn-end primary" onclick="resetGame()">Neues Spiel</button>
    <button class="btn-end secondary" onclick="saveState()">💾 Ergebnis speichern</button>
  </div>
</div>

<script>
// ============================================================
// JEOPARDY – THW Spiele
// ============================================================

const POINT_VALUES = [100, 200, 300, 400, 500, 750, 1000];

// team colors (border / bg / glow)
const TEAM_COLORS = [
  { border: '#e63946', bg: 'rgba(230,57,70,0.22)',   glow: '#e63946' },
  { border: '#2a9d8f', bg: 'rgba(42,157,143,0.22)',  glow: '#2a9d8f' },
  { border: '#f4a261', bg: 'rgba(244,162,97,0.22)',  glow: '#f4a261' },
  { border: '#a8dadc', bg: 'rgba(168,218,220,0.22)', glow: '#a8dadc' },
];

let G = {
  config:      null,
  teams:       [],        // [{name, members:[], score}]
  mode:        'quiz',    // 'quiz' | 'jeopardy'
  activeTeam:  0,
  revealed:    new Set(), // "ci,qi" strings
  currentCell: null,      // {ci, qi, points} while overlay open
  status:      'idle',    // 'idle' | 'playing' | 'finished'
  busy:        false,
  soundOn:     false,
  audioCtx:    null,
};

let teamCount = 2;

// ============================================================
// AUDIO
// ============================================================

function audioCtx() {
  if (!G.audioCtx) {
    G.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return G.audioCtx;
}

function tone(freq, dur, type, vol, delay) {
  if (!G.soundOn) return;
  type  = type  || 'sine';
  vol   = vol   || 0.28;
  delay = delay || 0;
  try {
    var c = audioCtx();
    var o = c.createOscillator();
    var g = c.createGain();
    o.connect(g);
    g.connect(c.destination);
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, c.currentTime + delay);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + delay + dur);
    o.start(c.currentTime + delay);
    o.stop(c.currentTime + delay + dur + 0.05);
  } catch (e) {}
}

function sndReveal()  { tone(440, 0.12); }
function sndCorrect() { tone(523, 0.1, 'sine', 0.22, 0); tone(659, 0.1, 'sine', 0.22, 0.12); tone(784, 0.22, 'sine', 0.22, 0.24); }
function sndWrong()   { tone(200, 0.14, 'sawtooth', 0.2, 0); tone(140, 0.18, 'sawtooth', 0.2, 0.14); }

function toggleSound() {
  G.soundOn = !G.soundOn;
  document.getElementById('btn-sound').textContent = G.soundOn ? '🔊' : '🔇';
}

// ============================================================
// YAML LOADING & VALIDATION
// ============================================================

function initUpload() {
  var area  = document.getElementById('upload-area');
  var input = document.getElementById('file-input');

  area.addEventListener('click', function() { input.click(); });
  area.addEventListener('dragover', function(e) {
    e.preventDefault();
    area.classList.add('drag-over');
  });
  area.addEventListener('dragleave', function() { area.classList.remove('drag-over'); });
  area.addEventListener('drop', function(e) {
    e.preventDefault();
    area.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
  });
  input.addEventListener('change', function() {
    if (input.files[0]) readFile(input.files[0]);
  });
}

function readFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var cfg = jsyaml.load(e.target.result);
      validate(cfg);
      G.config = cfg;
      showCfgPreview(cfg);
      hideError();
      if (cfg.game_state) {
        restoreGameState(cfg.game_state);
      } else {
        document.getElementById('btn-start').disabled = false;
      }
    } catch (err) {
      showError(err.message || String(err));
      G.config = null;
      document.getElementById('btn-start').disabled = true;
      document.getElementById('cfg-preview').style.display = 'none';
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function validate(c) {
  if (!c || typeof c !== 'object') {
    throw new Error('Ungültige YAML-Datei: kein Objekt.');
  }
  if (!c.title || typeof c.title !== 'string') {
    throw new Error('Pflichtfeld fehlt: "title" (muss ein String sein).');
  }
  if (!Array.isArray(c.categories) || c.categories.length < 3 || c.categories.length > 6) {
    throw new Error('"categories" muss ein Array mit 3 bis 6 Kategorien sein (gefunden: ' +
      (Array.isArray(c.categories) ? c.categories.length : 'kein Array') + ').');
  }
  for (var ci = 0; ci < c.categories.length; ci++) {
    var cat = c.categories[ci];
    if (!cat || !cat.name || typeof cat.name !== 'string') {
      throw new Error('Kategorie ' + (ci + 1) + ': Pflichtfeld "name" fehlt oder ist kein String.');
    }
    if (!Array.isArray(cat.questions) || cat.questions.length !== 7) {
      throw new Error('Kategorie "' + cat.name + '": "questions" muss genau 7 Fragen enthalten ' +
        '(gefunden: ' + (Array.isArray(cat.questions) ? cat.questions.length : 'kein Array') + ').');
    }
    for (var qi = 0; qi < cat.questions.length; qi++) {
      var q = cat.questions[qi];
      if (!q || !q.question || typeof q.question !== 'string') {
        throw new Error('Kategorie "' + cat.name + '", Frage ' + (qi + 1) + ': Pflichtfeld "question" fehlt oder ist kein String.');
      }
      if (!q.answer || typeof q.answer !== 'string') {
        throw new Error('Kategorie "' + cat.name + '", Frage ' + (qi + 1) + ': Pflichtfeld "answer" fehlt oder ist kein String.');
      }
    }
  }
}

function showCfgPreview(cfg) {
  var el   = document.getElementById('cfg-preview');
  var cats = cfg.categories.map(function(c) { return c.name; }).join(', ');
  el.innerHTML =
    '<strong>' + escHtml(cfg.title) + '</strong>' +
    (cfg.description ? '<br>' + escHtml(cfg.description) : '') +
    '<br><small style="color:#9999cc">' + cfg.categories.length +
    ' Kategorien &mdash; ' + escHtml(cats) + '</small>';
  el.style.display = 'block';
}

function showError(msg) {
  var el = document.getElementById('error-msg');
  el.textContent = '\u26A0 ' + msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

// ============================================================
// TEAM SETUP UI
// ============================================================

function initTeamUI() {
  document.getElementById('btn-teams-minus').addEventListener('click', function() {
    if (teamCount > 2) { teamCount--; renderTeamCards(); }
  });
  document.getElementById('btn-teams-plus').addEventListener('click', function() {
    if (teamCount < 4) { teamCount++; renderTeamCards(); }
  });
  renderTeamCards();
}

function renderTeamCards() {
  var grid = document.getElementById('teams-grid');
  var label = document.getElementById('team-count-display');
  label.textContent = teamCount + ' Team' + (teamCount !== 1 ? 's' : '');

  // Preserve entered values before re-render
  var saved = [];
  grid.querySelectorAll('.team-card').forEach(function(card, i) {
    saved[i] = {
      name:    card.querySelector('.inp-name').value,
      members: card.querySelector('.inp-members').value,
    };
  });

  grid.innerHTML = '';
  for (var i = 0; i < teamCount; i++) {
    var def     = 'Team ' + String.fromCharCode(65 + i);
    var sName   = (saved[i] && saved[i].name)    ? saved[i].name    : def;
    var sMemb   = (saved[i] && saved[i].members) ? saved[i].members : '';
    var card    = document.createElement('div');
    card.className  = 'team-card';
    card.dataset.team = i;
    card.innerHTML =
      '<label>Teamname</label>' +
      '<input type="text" class="inp-name" value="' + escAttr(sName) + '" placeholder="' + escAttr(def) + '">' +
      '<label>Mitglieder (kommagetrennt)</label>' +
      '<input type="text" class="inp-members" value="' + escAttr(sMemb) + '" placeholder="z.\u202FB. Anna, Ben, Clara">';
    grid.appendChild(card);
  }
}

function selectMode(mode) {
  G.mode = mode;
  document.querySelectorAll('.mode-btn').forEach(function(btn) {
    btn.classList.toggle('selected', btn.dataset.mode === mode);
  });
}

function collectTeams() {
  var teams = [];
  document.querySelectorAll('#teams-grid .team-card').forEach(function(card, i) {
    var nameVal    = card.querySelector('.inp-name').value.trim();
    var membersVal = card.querySelector('.inp-members').value.trim();
    teams.push({
      name:    nameVal || ('Team ' + String.fromCharCode(65 + i)),
      members: membersVal
        ? membersVal.split(',').map(function(m) { return m.trim(); }).filter(Boolean)
        : [],
      score:   0,
    });
  });
  return teams;
}

// ============================================================
// GAME START & RESTORE
// ============================================================

function startGame() {
  if (!G.config) return;
  G.teams      = collectTeams();
  G.activeTeam = 0;
  G.revealed   = new Set();
  G.status     = 'playing';
  G.currentCell = null;
  G.busy        = false;
  showScreen('screen-game');
  renderScores();
  renderBoard();
}

function restoreGameState(gs) {
  if (Array.isArray(gs.teams)) {
    teamCount = Math.min(4, Math.max(2, gs.teams.length));
    renderTeamCards();
    var cards = document.querySelectorAll('#teams-grid .team-card');
    gs.teams.forEach(function(t, i) {
      if (cards[i]) {
        cards[i].querySelector('.inp-name').value    = t.name || '';
        cards[i].querySelector('.inp-members').value = (t.members || []).join(', ');
      }
    });
  }
  if (gs.mode) selectMode(gs.mode);

  G.teams = (gs.teams || []).map(function(t, i) {
    return {
      name:    t.name || ('Team ' + String.fromCharCode(65 + i)),
      members: Array.isArray(t.members) ? t.members : [],
      score:   typeof t.score === 'number' ? t.score : 0,
    };
  });
  G.activeTeam = typeof gs.active_team === 'number' ? gs.active_team : 0;
  G.revealed   = new Set(
    (gs.revealed || []).map(function(pair) { return pair[0] + ',' + pair[1]; })
  );
  G.mode       = gs.mode || 'quiz';
  G.status     = gs.status === 'finished' ? 'finished' : 'playing';

  document.getElementById('btn-start').disabled = false;

  if (G.status === 'finished') {
    showScreen('screen-end');
    renderEndScreen();
  } else {
    showScreen('screen-game');
    renderScores();
    renderBoard();
  }
}

// ============================================================
// BOARD RENDERING
// ============================================================

function renderBoard() {
  var board   = document.getElementById('board');
  var cats    = G.config.categories;
  var numCats = cats.length;
  var numRows = POINT_VALUES.length; // 7

  board.style.gridTemplateColumns = 'repeat(' + numCats + ', 1fr)';
  board.style.gridTemplateRows    = 'auto repeat(' + numRows + ', 1fr)';
  board.innerHTML = '';

  // Header row: category names
  cats.forEach(function(cat) {
    var cell       = document.createElement('div');
    cell.className = 'board-cell header-cell';
    cell.textContent = cat.name;
    board.appendChild(cell);
  });

  // Value rows (qi = question index, ci = category index)
  for (var qi = 0; qi < numRows; qi++) {
    for (var ci = 0; ci < numCats; ci++) {
      var key      = ci + ',' + qi;
      var revealed = G.revealed.has(key);
      var cell     = document.createElement('div');
      cell.className = 'board-cell value-cell' + (revealed ? ' revealed' : '');
      if (!revealed) {
        cell.textContent = fmt(POINT_VALUES[qi]);
        (function(c, q, pts) {
          cell.addEventListener('click', function() { openQuestion(c, q, pts); });
        })(ci, qi, POINT_VALUES[qi]);
      }
      board.appendChild(cell);
    }
  }
}

// ============================================================
// SCORE RENDERING & ANIMATION
// ============================================================

function renderScores() {
  var container = document.getElementById('scores-container');
  container.innerHTML = '';

  G.teams.forEach(function(team, i) {
    var tc  = TEAM_COLORS[i] || TEAM_COLORS[0];
    var box = document.createElement('div');
    box.className = 'team-score-box' + (i === G.activeTeam ? ' active-team' : '');
    box.id = 'score-box-' + i;
    box.style.background   = tc.bg;
    box.style.borderColor  = tc.border;
    box.style.borderWidth  = '2px';
    box.style.borderStyle  = 'solid';
    if (i === G.activeTeam) {
      box.style.boxShadow = '0 0 14px 3px ' + tc.glow;
    }

    var membStr = team.members.length ? team.members.join(', ') : '';
    box.innerHTML =
      '<div class="team-name-label">' + escHtml(team.name) + '</div>' +
      (membStr ? '<div class="team-members-label">' + escHtml(membStr) + '</div>' : '') +
      '<div class="team-score-value" id="score-value-' + i + '">' + fmt(team.score) + '</div>';

    container.appendChild(box);
  });
}

function updateActiveTeam(newIdx) {
  var prev = G.activeTeam;
  G.activeTeam = newIdx;

  G.teams.forEach(function(_, i) {
    var box = document.getElementById('score-box-' + i);
    if (!box) return;
    var tc = TEAM_COLORS[i] || TEAM_COLORS[0];
    box.classList.toggle('active-team', i === newIdx);
    box.style.boxShadow = (i === newIdx) ? '0 0 14px 3px ' + tc.glow : '';
  });
}

function animateScore(teamIdx, delta) {
  var box     = document.getElementById('score-box-' + teamIdx);
  var valEl   = document.getElementById('score-value-' + teamIdx);
  if (!box || !valEl) return;

  var isPos = delta > 0;
  var cls   = isPos ? 'anim-up' : 'anim-down';

  box.classList.remove('anim-up', 'anim-down');
  // Trigger reflow to restart animation
  void box.offsetWidth;
  box.classList.add(cls);
  setTimeout(function() { box.classList.remove(cls); }, 600);

  // Floating delta label
  var floatEl = document.createElement('div');
  floatEl.className = 'score-delta ' + (isPos ? 'positive' : 'negative');
  floatEl.textContent = (isPos ? '+' : '\u2212') + fmt(Math.abs(delta));
  box.appendChild(floatEl);
  setTimeout(function() { if (floatEl.parentNode) floatEl.parentNode.removeChild(floatEl); }, 1200);

  // Count animation
  var from = G.teams[teamIdx].score - delta;
  var to   = G.teams[teamIdx].score;
  var dur  = 380;
  var t0   = performance.now();
  function tick(now) {
    var p = Math.min((now - t0) / dur, 1);
    var v = Math.round(from + (to - from) * (1 - (1 - p) * (1 - p)));
    valEl.textContent = fmt(v);
    if (p < 1) requestAnimationFrame(tick);
    else valEl.textContent = fmt(to);
  }
  requestAnimationFrame(tick);
}

function awardPoints(teamIdx, pts) {
  G.teams[teamIdx].score += pts;
  animateScore(teamIdx, pts);
  sndCorrect();
}

function deductPoints(teamIdx, pts) {
  G.teams[teamIdx].score -= pts;
  animateScore(teamIdx, -pts);
  // Note: sndWrong() is called at the point of judgment, not here
}

// ============================================================
// QUESTION OVERLAY
// ============================================================

function openQuestion(ci, qi, pts) {
  if (G.busy || G.revealed.has(ci + ',' + qi)) return;
  G.busy        = true;
  G.currentCell = { ci: ci, qi: qi, points: pts };

  var cat = G.config.categories[ci];
  var q   = cat.questions[qi];

  // In Jeopardy mode: show the answer text, player must form the question
  // In Quiz mode: show the question text, player gives the answer
  var displayText  = G.mode === 'jeopardy' ? q.answer   : q.question;
  var revealText   = G.mode === 'jeopardy' ? q.question : q.answer;
  var modeLabel    = G.mode === 'jeopardy' ? 'Jeopardy-Modus: Formuliere die Frage!' : 'Quiz-Modus: Beantworte die Frage!';
  var revealLabel  = G.mode === 'jeopardy' ? 'Gesuchte Frage' : 'Antwort';

  document.getElementById('overlay-cat-badge').textContent    = cat.name;
  document.getElementById('overlay-points-badge').textContent = fmt(pts);
  document.getElementById('overlay-mode-label').textContent   = modeLabel;
  document.getElementById('overlay-display-text').textContent = displayText;
  document.getElementById('overlay-answer-label').textContent = revealLabel;
  document.getElementById('overlay-answer-text').textContent  = revealText;

  // Reset answer section
  document.getElementById('overlay-answer-section').classList.add('hidden');
  document.getElementById('btn-reveal').style.display = '';
  document.getElementById('btn-nobody').style.display = '';
  document.getElementById('btn-close').style.display = 'none';
  document.getElementById('btn-phase3-continue').style.display = 'none';

  // Track teams that answer wrong this question (deductions are deferred)
  G.wrongTeams = [];

  // Build buzzer team buttons (Phase 1)
  var btnsContainer = document.getElementById('buzzer-team-btns');
  btnsContainer.innerHTML = '';

  G.teams.forEach(function(team, i) {
    var tc  = TEAM_COLORS[i] || TEAM_COLORS[0];
    var btn = document.createElement('button');
    btn.className = 'btn-buzzer';
    btn.dataset.teamIdx = i;
    btn.style.borderColor = tc.border;
    btn.style.color       = tc.border;
    btn.textContent       = team.name;
    btn.addEventListener('click', function() { onBuzzer(i); });
    btnsContainer.appendChild(btn);
  });

  // Show Phase 1, hide Phase 2 & 3
  showBuzzerPhase(1);

  sndReveal();
  document.getElementById('question-overlay').classList.remove('hidden');
}

function showBuzzerPhase(n) {
  [1, 2, 3].forEach(function(i) {
    var el = document.getElementById('buzzer-phase-' + i);
    el.classList.toggle('active', i === n);
  });
}

function onBuzzer(teamIdx) {
  // Transition to Phase 2: judge this team
  var pts = G.currentCell.points;
  var tc  = TEAM_COLORS[teamIdx] || TEAM_COLORS[0];

  var nameEl = document.getElementById('judge-team-name');
  nameEl.textContent       = G.teams[teamIdx].name;
  nameEl.style.borderColor = tc.border;
  nameEl.style.color       = tc.border;
  nameEl.style.background  = tc.bg;

  document.getElementById('btn-judge-correct').onclick = function() { onCorrect(teamIdx, pts); };
  document.getElementById('btn-judge-wrong').onclick   = function() { onWrong(teamIdx, pts); };
  document.getElementById('btn-judge-back').onclick    = function() { showBuzzerPhase(1); };

  showBuzzerPhase(2);
}

function revealAnswer() {
  document.getElementById('overlay-answer-section').classList.remove('hidden');
  document.getElementById('btn-reveal').style.display = 'none';
}

function onCorrect(teamIdx, pts) {
  // Deduct from all teams that answered wrong first
  G.wrongTeams.forEach(function(wrongIdx) {
    deductPoints(wrongIdx, pts);
  });

  awardPoints(teamIdx, pts);
  updateActiveTeam(teamIdx);
  revealAnswer();

  // Build multi-line result summary
  var linesEl = document.getElementById('result-lines');
  linesEl.innerHTML = '';

  var correctLine = document.createElement('div');
  correctLine.className = 'result-line is-correct';
  correctLine.innerHTML = '<span class="result-icon">\u2713</span> ' +
    escHtml(G.teams[teamIdx].name) + ' \u2014 <strong>+' + fmt(pts) + ' Punkte</strong>';
  linesEl.appendChild(correctLine);

  G.wrongTeams.forEach(function(wrongIdx) {
    var line = document.createElement('div');
    line.className = 'result-line is-wrong';
    line.innerHTML = '<span class="result-icon">\u2717</span> ' +
      escHtml(G.teams[wrongIdx].name) + ' \u2014 <strong>\u2212' + fmt(pts) + ' Punkte</strong>';
    linesEl.appendChild(line);
  });

  showBuzzerPhase(3);
  document.getElementById('btn-phase3-continue').style.display = 'none';
  document.getElementById('btn-nobody').style.display = 'none';
  document.getElementById('btn-close').style.display  = '';
}

function onWrong(teamIdx, pts) {
  // Track wrong answer — points are only deducted if someone eventually gets it right
  G.wrongTeams.push(teamIdx);
  sndWrong();

  // Show Phase 3 result with "Weiter" button
  var linesEl = document.getElementById('result-lines');
  linesEl.innerHTML = '';
  var line = document.createElement('div');
  line.className = 'result-line is-wrong';
  line.innerHTML = '<span class="result-icon">\u2717</span> ' +
    escHtml(G.teams[teamIdx].name) + ' \u2014 <strong>falsch</strong>';
  linesEl.appendChild(line);

  showBuzzerPhase(3);
  document.getElementById('btn-phase3-continue').style.display = '';
}

function onWrongContinue() {
  var teamIdx = G.wrongTeams[G.wrongTeams.length - 1];

  // Dim that team's buzzer button
  var allDimmed = true;
  document.querySelectorAll('#buzzer-team-btns .btn-buzzer').forEach(function(btn) {
    if (parseInt(btn.dataset.teamIdx) === teamIdx) btn.classList.add('buzzed-wrong');
    if (!btn.classList.contains('buzzed-wrong')) allDimmed = false;
  });

  if (allDimmed) {
    // All teams answered wrong — no point changes at all
    revealAnswer();
    var linesEl = document.getElementById('result-lines');
    linesEl.innerHTML = '';
    var line = document.createElement('div');
    line.className = 'result-line is-neutral';
    line.innerHTML = '<span class="result-icon">\u2014</span> Niemand richtig \u2014 keine Punkt\u00e4nderung';
    linesEl.appendChild(line);
    document.getElementById('btn-phase3-continue').style.display = 'none';
    document.getElementById('btn-nobody').style.display = 'none';
    document.getElementById('btn-close').style.display  = '';
    showBuzzerPhase(3);
  } else {
    showBuzzerPhase(1);
  }
}

function noOneCorrect() {
  // Moderator explicitly closes without any team answering correctly — no point changes
  revealAnswer();
  var linesEl = document.getElementById('result-lines');
  linesEl.innerHTML = '';
  var line = document.createElement('div');
  line.className = 'result-line is-neutral';
  line.innerHTML = '<span class="result-icon">\u2014</span> Niemand richtig \u2014 keine Punkt\u00e4nderung';
  linesEl.appendChild(line);
  showBuzzerPhase(3);
  document.getElementById('btn-phase3-continue').style.display = 'none';
  document.getElementById('btn-nobody').style.display = 'none';
  document.getElementById('btn-close').style.display  = '';
}

function closeQuestion() {
  if (!G.currentCell) return;
  var key = G.currentCell.ci + ',' + G.currentCell.qi;
  G.revealed.add(key);
  G.currentCell = null;
  G.busy        = false;
  document.getElementById('question-overlay').classList.add('hidden');
  renderBoard();
  checkBoardComplete();
}

function checkBoardComplete() {
  var total = G.config.categories.length * POINT_VALUES.length;
  if (G.revealed.size >= total) {
    G.status = 'finished';
    setTimeout(function() {
      showScreen('screen-end');
      renderEndScreen();
    }, 500);
  }
}

// ============================================================
// END SCREEN
// ============================================================

function renderEndScreen() {
  var ranked = G.teams
    .map(function(t, i) { return { name: t.name, members: t.members, score: t.score, idx: i }; })
    .sort(function(a, b) { return b.score - a.score; });

  var winner = ranked[0];
  document.getElementById('end-winner').innerHTML =
    '\uD83C\uDFC6 <strong>' + escHtml(winner.name) + '</strong> gewinnt mit ' +
    '<strong style="color:var(--gold)">' + fmt(winner.score) + ' Punkten</strong>!';

  var el = document.getElementById('end-rankings');
  el.innerHTML = '';
  var medals = ['\uD83E\uDD47', '\uD83E\uDD48', '\uD83E\uDD49'];
  ranked.forEach(function(team, rank) {
    var row = document.createElement('div');
    row.className = 'end-rank-row' + (rank === 0 ? ' first' : '');
    row.innerHTML =
      '<div class="rank-pos">' + (medals[rank] || (rank + 1 + '.')) + '</div>' +
      '<div class="rank-info">' +
        '<div class="rank-name">' + escHtml(team.name) + '</div>' +
        (team.members.length ? '<div class="rank-members">' + escHtml(team.members.join(', ')) + '</div>' : '') +
      '</div>' +
      '<div class="rank-score">' + fmt(team.score) + '</div>';
    el.appendChild(row);
  });
}

// ============================================================
// SAVE STATE
// ============================================================

function saveState() {
  if (!G.config) return;
  var out = JSON.parse(JSON.stringify(G.config));
  out.game_state = {
    teams: G.teams.map(function(t) {
      return { name: t.name, members: t.members, score: t.score };
    }),
    mode:        G.mode,
    active_team: G.activeTeam,
    revealed:    Array.from(G.revealed).map(function(k) {
      return k.split(',').map(Number);
    }),
    status: G.status,
  };
  var yaml = jsyaml.dump(out, { indent: 2, lineWidth: 120 });
  var blob = new Blob([yaml], { type: 'text/yaml' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href   = url;
  var safe = (G.config.title || 'jeopardy')
    .replace(/[^a-z0-9\u00e4\u00f6\u00fc\u00df\-_ ]/gi, '')
    .replace(/\s+/g, '_')
    .toLowerCase();
  a.download = safe + '_spielstand.yaml';
  a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// RESET
// ============================================================

function confirmNewGame() {
  if (confirm('Neues Spiel starten? Der aktuelle Spielstand geht verloren.')) {
    resetGame();
  }
}

function resetGame() {
  G.config      = null;
  G.teams       = [];
  G.revealed    = new Set();
  G.status      = 'idle';
  G.busy        = false;
  G.currentCell = null;
  G.activeTeam  = 0;
  teamCount     = 2;
  renderTeamCards();
  document.getElementById('btn-start').disabled = true;
  document.getElementById('cfg-preview').style.display = 'none';
  document.getElementById('file-input').value = '';
  hideError();
  document.getElementById('question-overlay').classList.add('hidden');
  showScreen('screen-start');
}

// ============================================================
// HELPERS
// ============================================================

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) {
    s.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

function fmt(n) {
  return Number(n).toLocaleString('de-DE');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escAttr(s) {
  return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ============================================================
// INIT
// ============================================================

window.addEventListener('DOMContentLoaded', function() {
  initUpload();
  initTeamUI();
  selectMode('quiz');
});
</script>
