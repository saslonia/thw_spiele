# Beispiel-Konfiguration für "Wer wird Millionär?" – THW Spiele
# ================================================================
# Kopiere diese Datei, passe die Fragen an und lade sie im Spiel hoch.
#
# PFLICHT : title + genau 15 questions
# OPTIONAL: description, jokers pro Frage, game_state
#
# Tipp: Mit dem Fragen-Manager unter tools/wer-wird-millionaer-fragen-manager/
# lassen sich Fragendateien komfortabel über eine Web-Oberfläche erstellen.
# ================================================================

title: "Allgemeinwissen – Vorlage"
description: "15 Beispielfragen als Vorlage – ersetze diese durch deine eigenen Fragen"

questions:

# --- Frage 1: Für 100 € (sehr leicht) ---
- question: "Was ist die Hauptstadt von Deutschland?"
  answers:
  - "Hamburg" # A
  - "München" # B
  - "Berlin" # C
  - "Frankfurt" # D
  correct: 2 # Index der richtigen Antwort: 0=A, 1=B, 2=C, 3=D

  # Joker-Daten (OPTIONAL). Ohne diese Angaben werden Zufallswerte generiert.
  jokers:
    audience: [ 5, 8, 82, 5 ] # Publikums-% für A, B, C, D (sollte 100 ergeben)
    phone: "Das ist eindeutig Berlin – die Hauptstadt Deutschlands!"
    additional: "Berlin, Antwort C – das weiß doch jeder!"

