title: "THW-Grundwissen"
description: "Jeopardy-Wissensquiz rund um das Technische Hilfswerk"

categories:
  - name: "THW-Organisation"
    questions:
      - question: "Was ist die Abkuerzung THW?"
        answer: "Technisches Hilfswerk"
      - question: "Wie heisst die kleinste taktische Einheit im THW?"
        answer: "Trupp"
      - question: "Welchem Bundesministerium ist das THW unterstellt?"
        answer: "Dem Bundesministerium des Innern (BMI)"
      - question: "Wie heisst die groesste taktische Einheit eines THW-Ortsverbandes?"
        answer: "Technischer Zug (TZ)"
      - question: "Wie viele Ortsverbande hat das THW bundesweit (ca.)?"
        answer: "Rund 668 Ortsverbande"
      - question: "Wie heisst die uebergeordnete Verwaltungsebene zwischen Ortsverband und Bundesanstalt?"
        answer: "Regionalstelle (frueher: Geschaeftsstelle)"
      - question: "Welche Rechtsform hat das THW?"
        answer: "Bundesanstalt des oeffentlichen Rechts"

  - name: "Einsatz & Aufgaben"
    questions:
      - question: "Welche Farbe hat die typische THW-Einsatzkleidung?"
        answer: "Blau"
      - question: "Wofuer steht die Abkuerzung ABC im Katastrophenschutz?"
        answer: "Atomar, Biologisch, Chemisch"
      - question: "Wie heisst die Fachgruppe im THW, die fuer die Trinkwasserversorgung zustaendig ist?"
        answer: "Fachgruppe Wasserschaden/Pumpen (WP)"
      - question: "Was ist die Aufgabe der Fachgruppe Ortung?"
        answer: "Suche und Ortung von verschuetteten Personen"
      - question: "Bei welchem Hochwasser war das THW 2021 mit besonders vielen Kraeften im Einsatz?"
        answer: "Ahrtal-Hochwasser (Flutkatastrophe 2021)"
      - question: "Welche internationale UN-Klassifizierung hat das THW fuer Auslandseinsaetze?"
        answer: "Heavy USAR (Urban Search and Rescue) - IEC-Level 3"
      - question: "Wie heisst das THW-eigene System zur Anforderung von Fachgruppen bei ueberregionalen Einsaetzen?"
        answer: "Kraeftemanagementsystem (KMS) / ILIAS-Einsatzmeldung"

  - name: "Fahrzeuge & Geraet"
    questions:
      - question: "Welche Farbe haben THW-Einsatzfahrzeuge?"
        answer: "Weiss mit blauem Streifen (kornblumenblau)"
      - question: "Wie heisst das typische Einsatzfahrzeug des Technischen Zuges?"
        answer: "Mannschaftstransportwagen (MTW) oder Geraetekraftwagen (GKW)"
      - question: "Wofuer wird ein Notstromaggregat im Einsatz benoetigt?"
        answer: "Zur unabhaengigen Stromversorgung (z. B. Beleuchtung, Geraete)"
      - question: "Welches Werkzeug nutzt die Bergungsgruppe zum hydraulischen Spreizen und Schneiden?"
        answer: "Hydraulisches Rettungsgeraet (Spreizer / Schneidgeraet)"
      - question: "Was ist ein SW 2000 im THW?"
        answer: "Stromerzeuger mit 2.000 kVA Leistung (Fachgruppe Elektroversorgung)"
      - question: "Welche Abkuerzung steht fuer den grossen Bohrgeraetewagen im THW?"
        answer: "BoBo / Bohrgeraetewagen (GKW Bohrung)"
      - question: "Wie heisst das amphibische Einsatzfahrzeug des THW?"
        answer: "Mehrzweckboot (MzB) / Amphibienfahrzeug Seacat"

  - name: "Dienstgrade & Struktur"
    questions:
      - question: "Wie heisst der Leiter eines THW-Ortsverbandes?"
        answer: "Ortsbeauftragter (OB)"
      - question: "Welche Funktion hat ein Zugfuehrer im Technischen Zug?"
        answer: "Fuehrung des gesamten Technischen Zuges"
      - question: "Wie heisst die unterste Helfer-Stufe im THW?"
        answer: "Helfer (Grundausbildung)"
      - question: "Welche Funktion uebernimmt der Gruppenfuehrer im THW?"
        answer: "Fuehrung einer Bergungsgruppe oder Fachgruppe (8-12 Personen)"
      - question: "Wie heisst die Fuehrungsfunktion, die zwischen Zugfuehrer und Gruppenfuehrer liegt?"
        answer: "Zugtrupp-Fuehrer / Einheitsfuehrer (EF)"
      - question: "Was ist der Unterschied zwischen einem Helfer und einem Fachhelfer im THW?"
        answer: "Fachhelfer hat eine fachspezifische Zusatzausbildung (z. B. fuer Fachgruppen)"
      - question: "Wie heisst die zentrale Ausbildungseinrichtung des THW?"
        answer: "THW-Bundesschule in Neuhausen auf den Fildern"

  - name: "Erste Hilfe & Sicherheit"
    questions:
      - question: "Was bedeutet die Abkuerzung PSA im Arbeitsschutz?"
        answer: "Persoenliche Schutzausruestung"
      - question: "Wie viele Herzdruckmassagen fuehrt man pro Minute bei der Reanimation durch?"
        answer: "100-120 pro Minute"
      - question: "Welches Zeichen kennzeichnet einen Sammelplatz im Katastrophenschutz?"
        answer: "Gruenes Schild mit weissem Pfeil und Mensch-Piktogramm"
      - question: "Was ist bei einem Notruf (112) als Erstes zu nennen?"
        answer: "Standort / Wo ist der Notfall?"
      - question: "Welchen Feuerloeschertyp darf man NICHT bei elektrischen Anlagen unter Spannung einsetzen?"
        answer: "Wasserloescher (Schaumloescher ebenfalls problematisch bei hoher Spannung)"
      - question: "Was regelt die DGUV Vorschrift 1 im deutschen Arbeitsschutzrecht?"
        answer: "Grundsaetze der Praevention (allgemeine Pflichten von Unternehmern und Versicherten)"
      - question: "Wie heisst das Schutzkonzept, das Einsatzkraefte vor psychischen Belastungen schuetzen soll?"
        answer: "Psychosoziale Notfallversorgung (PSNV) / Einsatznachsorge"
